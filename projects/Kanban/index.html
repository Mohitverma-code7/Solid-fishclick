<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Kanban Pro 🚀</h1>

  <div class="board">

    <div class="column">
      <h2>Todo (<span class="count">0</span>)</h2>
      <div class="tasks"></div>
      <input type="text" class="task-input" placeholder="Enter task..." />
      <button class="add-btn">+ Add Task</button>
    </div>

    <div class="column">
      <h2>In Progress (<span class="count">0</span>)</h2>
      <div class="tasks"></div>
      <input type="text" class="task-input" placeholder="Enter task..." />
      <button class="add-btn">+ Add Task</button>
    </div>

    <div class="column">
      <h2>Done (<span class="count">0</span>)</h2>
      <div class="tasks"></div>
      <input type="text" class="task-input" placeholder="Enter task..." />
      <button class="add-btn">+ Add Task</button>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
